    <rect x="10" y="-10" width="10" height="8" rx="1.5" fill="#ff8c1a" opacity="0.9"/>
    
    <!-- Wheels -->
    <circle cx="-18" cy="12" r="5" fill="none" stroke="#ff8c1a" stroke-width="2"/>
    <circle cx="0" cy="12" r="5" fill="none" stroke="#ff8c1a" stroke-width="2"/>
    <circle cx="18" cy="12" r="5" fill="none" stroke="#ff8c1a" stroke-width="2"/>
